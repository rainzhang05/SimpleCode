name: Release Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  release-build:
    name: Release build
    runs-on: macos-26
    timeout-minutes: 30
    env:
      DEVELOPER_DIR: /Applications/Xcode_26.6.app/Contents/Developer
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Select Xcode
        run: sudo xcode-select -s "$DEVELOPER_DIR"

      - name: Build release
        run: |
          xcodebuild \
            -project SimpleCode.xcodeproj \
            -scheme SimpleCode \
            -configuration Release \
            -destination 'platform=macOS,arch=arm64' \
            build
